services:
  postgres:
    image: postgres:15-alpine
    container_name: digishield-db
    restart: always
    environment:
      POSTGRES_USER: ${DB_USER:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-password}
      POSTGRES_DB: ${DB_NAME:-digishield}
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data

  backend:
    build:
      context: ./backend
    container_name: digishield-api
    restart: always
    environment:
      DATABASE_URL: postgresql://${DB_USER:-postgres}:${DB_PASSWORD:-password}@postgres:5432/${DB_NAME:-digishield}?schema=public
      PORT: 5000
      JWT_SECRET: ${JWT_SECRET:-digishield_super_secret_2026}
      NODE_ENV: production
    ports:
      - "5000:5000"
    depends_on:
      - postgres

  frontend:
    build:
      context: .
    container_name: digishield-ui
    restart: always
    ports:
      - "80:80"
    depends_on:
      - backend

volumes:
  postgres-data:
